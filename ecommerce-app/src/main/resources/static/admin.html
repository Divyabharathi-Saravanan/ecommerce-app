<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ShopLine PRO - Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; }
        .admin-header { background: #2c3e50; color: white; padding: 20px 0; margin-bottom: 30px; }
        .card { border-radius: 15px; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-warning { font-weight: bold; }
    </style>
</head>
<body>

<div class="admin-header text-center">
    <h1>ShopLine <span class="text-warning">PRO</span> Admin Dashboard</h1>
    <a href="/" class="btn btn-outline-light btn-sm mt-2">← Back to Storefront</a>
</div>

<div class="container">
    <div class="row">
        <div class="col-md-4 mb-4">
            <div class="card p-4">
                <h4 class="mb-4">Add New Product</h4>
                <form id="addProductForm">
                    <div class="mb-3">
                        <label class="form-label">Product Name</label>
                        <input type="text" id="name" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Category</label>
                        <select id="category" class="form-select">
                            <option value="Bath & Body">Bath & Body</option>
                            <option value="Baby Care">Baby Care</option>
                            <option value="Hair Care">Hair Care</option>
                            <option value="Beauty">Beauty Products</option>
                            <option value="Healthcare & Pharma">Healthcare & Pharma</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Price ($)</label>
                        <input type="number" id="price" class="form-control" step="0.01" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Image URL</label>
                        <input type="text" id="imageUrl" class="form-control" placeholder="https://unsplash.com/...">
                    </div>
                    <button type="submit" class="btn btn-warning w-100">Save Product</button>
                </form>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card p-4">
                <h4 class="mb-4">Current Inventory</h4>
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Category</th>
                                <th>Price</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="admin-product-list">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Logic to load and add products would go here
    async function fetchInventory() {
        const res = await fetch('http://localhost:8082/api/products');
        const data = await res.json();
        const list = document.getElementById('admin-product-list');
        list.innerHTML = data.map(p => `
            <tr>
                <td>${p.id}</td>
                <td>${p.name}</td>
                <td>${p.category}</td>
                <td>$${p.price.toFixed(2)}</td>
                <td><button class="btn btn-danger btn-sm">Delete</button></td>
            </tr>
        `).join('');
    }
    window.onload = fetchInventory;
</script>
</body>
</html>
