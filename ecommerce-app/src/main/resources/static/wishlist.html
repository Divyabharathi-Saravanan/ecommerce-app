<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>My Wishlist</title>
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark p-3">
        <div class="container">
            <a href="index.html" class="text-white text-decoration-none"><i class="fas fa-arrow-left"></i> Back to Shop</a>
            <h5 class="text-white m-0">My Wishlist ❤️</h5>
        </div>
    </nav>

    <div class="container mt-4">
        <div id="wishlist-items" class="row">
            </div>
    </div>

    <script>
        function displayWishlist() {
            const wishlist = JSON.parse(localStorage.getItem('wishlist')) || [];
            const container = document.getElementById('wishlist-items');
            container.innerHTML = '';

            if (wishlist.length === 0) {
                container.innerHTML = '<div class="text-center mt-5"><h5>Your wishlist is empty!</h5></div>';
                return;
            }

            wishlist.forEach((item, index) => {
                container.innerHTML += `
                    <div class="col-md-3 mb-4">
                        <div class="card border-0 shadow-sm p-2 text-center">
                            <img src="${item.image}" style="height:120px; object-fit:contain;">
                            <h6 class="mt-2 fw-bold">${item.name}</h6>
                            <p class="text-primary small">₹${item.price}</p>
                            <div class="d-flex gap-1">
                                <button class="btn btn-warning btn-sm flex-grow-1 fw-bold" onclick="buyNow()">Buy Now</button>
                                <button class="btn btn-outline-danger btn-sm" onclick="removeFromWishlist(${index})">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </div>
                    </div>`;
            });
        }

        function removeFromWishlist(index) {
            let wishlist = JSON.parse(localStorage.getItem('wishlist'));
            wishlist.splice(index, 1);
            localStorage.setItem('wishlist', JSON.stringify(wishlist));
            displayWishlist();
        }

        function buyNow() {
            alert("Redirecting to Checkout...");
        }

        displayWishlist();
    </script>
</body>
</html>
